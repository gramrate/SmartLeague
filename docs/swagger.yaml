securityDefinitions:
  CookieAuth:
    description: Authentication via HttpOnly cookies. System uses two cookies:\n-
      `user_auth_access_token` (short-lived)\n- `user_auth_refresh_token` (long-lived)\n\nAll
      protected endpoints require valid cookies to be automatically sent by browser.
    in: cookie
    name: user_auth_access_token
    type: apiKey
