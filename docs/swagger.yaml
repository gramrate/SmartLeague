info:
  contact:
    email: mmishin2107@gmail.com
    name: API Support
  description: Backend service for Leech-ru platform. Uses cookie-based authentication
    with HttpOnly tokens.
  title: Leech API
  version: "1.0"
paths:
  /api/v1/admin/news:
    get:
      consumes:
      - application/json
      description: Retrieves a list of news with pagination, preview length option,
        and hidden flag (for admins).
      parameters:
      - description: Max number of items
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        minimum: 0
        name: offset
        type: integer
      - description: Number of characters for content preview
        in: query
        maximum: 500
        minimum: 1
        name: preview_length
        type: integer
      - description: Filter by hidden status (true/false)
        in: query
        name: is_hidden
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetAllByFilterForAdminsNewsResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
      security:
      - CookieAuth: []
      summary: Get news by filters (admin)
      tags:
      - news
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Refreshes access and refresh tokens using valid refresh token from
        cookies
      parameters:
      - description: Must be 'true'
        enum:
        - "true"
        in: query
        name: goyda
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Successful updated
        "400":
          description: Invalid request or validation error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "401":
          description: Unauthorized - invalid/missing refresh token
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
      summary: Refresh tokens
      tags:
      - auth
  /api/v1/category:
    get:
      consumes:
      - application/json
      description: Retrieves a list of category filtered by category, volume, title,
        etc.
      parameters:
      - description: Max number of items
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Offset for pagination
        in: query
        minimum: 0
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetAllCategoriesResponse'
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
      summary: Get category by filters
      tags:
      - category
    post:
      consumes:
      - application/json
      description: Creates a new category product with provided details.
      parameters:
      - description: Category product data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateCategoryResponse'
        "400":
          description: Invalid request body or validation error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "409":
          description: 'Conflict: invalid category format'
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
      security:
      - CookieAuth: []
      summary: Create a new category product
      tags:
      - category
  /api/v1/category/{id}:
    delete:
      description: Deletes the category product with the given UUID.
      parameters:
      - description: Category ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Successfully deleted
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "404":
          description: Category not found
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
      security:
      - CookieAuth: []
      summary: Delete category by ID
      tags:
      - category
    get:
      consumes:
      - application/json
      description: Retrieves a category product using its UUID.
      parameters:
      - description: Cosmetic ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.GetByIdCategoryResponse'
        "400":
          description: Validation error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "404":
          description: Cosmetic not found
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
      summary: Get category by ID
      tags:
      - category
    patch:
      consumes:
      - application/json
      description: Updates category product fields by given ID.
      parameters:
      - description: Cosmetic ID (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Updated category fields
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UpdateCategoryResponse'
        "400":
          description: Validation or binding error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "404":
          description: Cosmetic not found
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
      security:
      - CookieAuth: []
      summary: Update category
      tags:
      - category
