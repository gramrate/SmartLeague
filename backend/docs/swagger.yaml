securityDefinitions:
  CookieAuth:
    description: Authentication via HttpOnly cookies:\n- `user_auth_access_token`
      (short-lived)\n- `user_auth_refresh_token` (long-lived)\n\nProtected endpoints
      require valid cookies to be sent by the client.
    in: cookie
    name: user_auth_access_token
    type: apiKey
