host: localhost:8000
info:
  contact:
    name: SmartLeague Backend
  description: Backend service for SmartLeague. Cookie-based auth (HttpOnly access/refresh
    cookies).
  title: SmartLeague API
  version: "1.0"
paths:
  /api/v1/auth/refresh:
    post:
      description: Refreshes access and refresh tokens using valid refresh token from
        cookies
      produces:
      - application/json
      responses:
        "204":
          description: OK
        "401":
          description: Unauthorized - invalid/missing refresh token
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
      summary: Refresh tokens
      tags:
      - token
  /api/v1/club:
    post:
      consumes:
      - application/json
      parameters:
      - description: Club data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateClubRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateClubResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.HTTPStatus'
      security:
      - CookieAuth: []
      summary: Create club
      tags:
      - club
  /api/v1/club/{id}:
    delete:
      parameters:
      - description: Club ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
